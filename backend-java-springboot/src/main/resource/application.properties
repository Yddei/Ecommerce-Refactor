spring.datasource.url=jdbc:mysql://db:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_ROOT_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET:ifdockercomposefilefails}
app.jwt.issuer=${JWT_ISSUER:ifdockercomposefilefails}