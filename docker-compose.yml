services:
  #MySQL
  db:
    image: mysql:8.0
    container_name: ebookshop-db
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - ebookshop-network
  #Spring Boot
  ebookshop-api:
    build: 
      context: ./backend-java-springboot
    container_name: ebookshop-api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_ISSUER: ebookshop-api
    networks:
      - ebookshop-network
  #Node gateway
  ebookshop-gateway: 
    env_file: .env
    build: ./node-gateway
    container_name: ebookshop-gateway
    ports:
      - "3030:3030"
    environment:
      NODE_PORT: ${NODE_PORT}
      BACKEND_URL: ${BACKEND_URL_DOCKER}
    depends_on:
      - ebookshop-api
    networks:
      - ebookshop-network

networks:
  ebookshop-network:
    driver: bridge