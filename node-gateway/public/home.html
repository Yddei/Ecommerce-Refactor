<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>books or smth</title>

    <link href="/index_files/bootstrap.min.css" rel="stylesheet">
    <link href="/index_files/cover.css" rel="stylesheet">

    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }
      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }
    </style>
</head>

<body class="d-flex h-100 text-center text-white bg-dark">
    
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
  
  <header class="mb-auto">
    <div>
      <h3 class="float-md-start mb-0">books or smth</h3>
      <nav class="nav nav-masthead justify-content-center float-md-end">
        <a class="nav-link fw-bold py-1 px-0 active" aria-current="page" href="/home.html">Home</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3 logged-out" href="/login.html">Login</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3 logged-out" href="/register.html">Register</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3 logged-in" href="/orders.html">Orders</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3 logged-in" href="#" onclick="handleLogout(event)">Logout</a>
      </nav>
    </div>
  </header>

  <main class="px-3">
    <h1>books i guess</h1>
    <p class="lead">get textbooks or smth</p>
    <p class="lead">
      <a href="/shop.html" class="btn btn-lg btn-secondary fw-bold border-white bg-white">Shop Now</a>
    </p>
  </main>

  <footer class="mt-auto text-white-50">
      <p>Template credits to: <a href="https://twitter.com/mdo" class="text-white">@mdo</a>.</p>
  </footer>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1050;">
    <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div id="toastBody" class="toast-body">
            </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('successToast').classList.remove('show');" aria-label="Close"></button>
      </div>
    </div>
</div>

<script>
    window.onload = () => {
        //toast from self or login
        const message = localStorage.getItem('toast');
        if (message) {
            const toastElement = document.getElementById('successToast');
            document.getElementById('toastBody').innerText = message;
            toastElement.classList.add('show');
            
            localStorage.removeItem('toast');
            
            setTimeout(() => {
                toastElement.classList.remove('show');
            }, 3000);
        }

        //visual log in log out
        const token = localStorage.getItem('token');
        const isLoggedIn = (token !== null && token !== "");

        document.querySelectorAll('.logged-in').forEach(el => {
            el.style.setProperty('display', isLoggedIn ? 'flex' : 'none', 'important');
        });
        document.querySelectorAll('.logged-out').forEach(el => {
            el.style.setProperty('display', isLoggedIn ? 'none' : 'flex', 'important');
        });
    };

    //logout
    function handleLogout(event) {
        event.preventDefault();
        localStorage.removeItem('token');
        //set toast, go back to self
        localStorage.setItem('toast', 'Successfully logged out.');
        window.location.href = '/home.html';
    }
</script>

</body>
</html>
