<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="/index_files/bootstrap.min.css" rel="stylesheet">
    <link href="/index_files/cover.css" rel="stylesheet">
</head>

<body class="d-flex min-vh-100 text-center text-white bg-dark">
    
<div class="cover-container d-flex w-100 min-vh-100 p-3 mx-auto flex-column">
  
  <header class="mb-auto">
    <div>
      <h3 class="float-md-start mb-0">books or smth</h3>
      <nav class="nav nav-masthead justify-content-center float-md-end">
        <a class="nav-link fw-bold py-1 px-0" href="/home.html">Home</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3 active" href="/login.html">Login</a>
        <a class="nav-link fw-bold py-1 px-0 ms-3" href="/register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="px-3 mb-5">
    <h1>Login</h1>
    
    <form id="loginForm" class="text-start mt-4">
        
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" required>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required>
        </div>

        <div id="errorMessage" class="text-danger mb-3 fw-bold"></div>

        <button type="submit" class="btn btn-lg btn-secondary fw-bold border-white bg-white w-100 mt-4">
            Log In
        </button>
    </form>
    
    <p class="mt-3 text-white-50">
        Don't have an account? <a href="/register.html" class="text-white">Register here</a>.
    </p>

  </main>

  <footer class="mt-auto text-white-50">
      <p>Template credits to: <a href="https://twitter.com/mdo" class="text-white">@mdo</a>.</p>
  </footer>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1050;">
    <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div id="toastBody" class="toast-body">
            </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('successToast').classList.remove('show');" aria-label="Close"></button>
      </div>
    </div>
</div>

<script>
    //toast from register
    window.onload = () => {
        const message = localStorage.getItem('toast');
        if (message) {
            const toastElement = document.getElementById('successToast');
            const toastBody = document.getElementById('toastBody');
            toastBody.innerText = message;
            toastElement.classList.add('show');

            localStorage.removeItem('toast');

            setTimeout(() => {
                toastElement.classList.remove('show');
            }, 3000);
        }
    };

    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); 

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });
            if (response.ok) {
                const data= await response.json()
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('toast', 'Logged in');
                    window.location.href = '/home.html';
                }
            } 
            else {
                const errorText = await response.text();
                errorMsg.innerText = errorText || 'Invalid credentials';
            }
        } 
        catch (error) {
            console.error(error);
            document.getElementById('errorMessage').innerText = 'server error'; 
        }
    });
</script>

</body>
</html>
